<div class="p-8 max-w-2xl">
    <div class="mb-8">
      <a routerLink="/cultivos" class="text-[#206223] text-sm font-medium flex items-center gap-1 mb-4 hover:underline">
        <span class="material-symbols-outlined text-base">arrow_back</span> Volver
      </a>
      <h2 style="font-family:'Manrope',sans-serif" class="text-4xl font-extrabold text-[#1a1c1a]">
        {{ esEdicion ? 'Editar Cultivo' : 'Nuevo Cultivo' }}
      </h2>
    </div>
  
    <div *ngIf="error" class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">{{ error }}</div>
  
    <div class="bg-white rounded-xl border border-[#e2e3df] p-8">
      <form (ngSubmit)="guardar()" #f="ngForm" class="space-y-6">
        <div>
          <label class="block text-xs font-bold text-[#40493d] uppercase tracking-wider mb-2">Nombre del Cultivo</label>
          <input [(ngModel)]="cultivo.nombre" name="nombre" required
                 class="w-full border border-[#bfcaba] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#206223] focus:ring-1 focus:ring-[#206223] transition-all"
                 placeholder="Ej: Maíz Sierra Norte"/>
        </div>
        <div>
          <label class="block text-xs font-bold text-[#40493d] uppercase tracking-wider mb-2">Tipo de Cultivo</label>
          <select [(ngModel)]="cultivo.tipo" name="tipo" required
                  class="w-full border border-[#bfcaba] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#206223] transition-all bg-white">
            <option value="">Seleccione un tipo</option>
            <option value="cereal">Cereal</option>
            <option value="hortaliza">Hortaliza</option>
            <option value="fruta">Fruta</option>
            <option value="tubérculo">Tubérculo</option>
            <option value="leguminosa">Leguminosa</option>
            <option value="oleaginosa">Oleaginosa</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-[#40493d] uppercase tracking-wider mb-2">Área (Hectáreas)</label>
            <input [(ngModel)]="cultivo.area_hectareas" name="area" type="number" step="0.01" required
                   class="w-full border border-[#bfcaba] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#206223] transition-all"
                   placeholder="0.00"/>
          </div>
          <div>
            <label class="block text-xs font-bold text-[#40493d] uppercase tracking-wider mb-2">Fecha de Siembra</label>
            <input [(ngModel)]="cultivo.fecha_siembra" name="fecha" type="date" required
                   class="w-full border border-[#bfcaba] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#206223] transition-all"/>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-[#40493d] uppercase tracking-wider mb-2">Estado</label>
          <select [(ngModel)]="cultivo.estado" name="estado"
                  class="w-full border border-[#bfcaba] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#206223] transition-all bg-white">
            <option value="activo">Activo</option>
            <option value="cosechado">Cosechado</option>
            <option value="en_riesgo">En Riesgo</option>
          </select>
        </div>
        <div class="flex justify-end gap-4 pt-4">
          <a routerLink="/cultivos"
             class="px-6 py-3 text-stone-500 font-semibold hover:bg-stone-50 rounded-xl transition-all text-sm">
            Cancelar
          </a>
          <button type="submit" [disabled]="loading || f.invalid"
                  class="bg-[#206223] text-white px-8 py-3 rounded-xl font-bold hover:opacity-90 transition-all disabled:opacity-50 text-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-base">save</span>
            {{ loading ? 'Guardando...' : 'Guardar Cultivo' }}
          </button>
        </div>
      </form>
    </div>
  </div>
