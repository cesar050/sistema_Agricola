<div class="p-8">
    <div class="flex justify-between items-end mb-8">
      <div>
        <h2 style="font-family:'Manrope',sans-serif" class="text-4xl font-extrabold text-[#1a1c1a]">Cultivos</h2>
        <p class="text-[#40493d] mt-1">Gestiona todos tus lotes agrícolas.</p>
      </div>
      <a routerLink="/cultivos/nuevo"
         class="bg-[#206223] text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:opacity-90 transition-all text-sm">
        <span class="material-symbols-outlined">add</span> Nuevo Cultivo
      </a>
    </div>
  
    <div *ngIf="mensaje" class="mb-6 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-xl text-sm font-medium">
      {{ mensaje }}
    </div>
  
    <div *ngIf="loading" class="text-center py-20 text-stone-400">
      <span class="material-symbols-outlined text-5xl animate-spin">refresh</span>
    </div>
  
    <div *ngIf="!loading" class="bg-white rounded-xl border border-[#e2e3df] overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-[#f4f4f0] text-[#40493d] text-xs uppercase tracking-wider">
            <th class="px-6 py-4 text-left">ID</th>
            <th class="px-6 py-4 text-left">Nombre</th>
            <th class="px-6 py-4 text-left">Tipo</th>
            <th class="px-6 py-4 text-left">Área (ha)</th>
            <th class="px-6 py-4 text-left">Fecha Siembra</th>
            <th class="px-6 py-4 text-left">Estado</th>
            <th class="px-6 py-4 text-left">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-[#f4f4f0]">
          <tr *ngFor="let c of cultivos" class="hover:bg-[#faf9f5] transition-colors">
            <td class="px-6 py-4 text-stone-400 font-mono text-xs">#{{ c.id }}</td>
            <td class="px-6 py-4 font-semibold text-[#1a1c1a]">{{ c.nombre }}</td>
            <td class="px-6 py-4 text-[#40493d] capitalize">{{ c.tipo }}</td>
            <td class="px-6 py-4">{{ c.area_hectareas }}</td>
            <td class="px-6 py-4">{{ c.fecha_siembra }}</td>
            <td class="px-6 py-4">
              <span class="px-2 py-1 rounded-full text-xs font-bold" [ngClass]="estadoClass(c.estado)">
                {{ c.estado }}
              </span>
            </td>
            <td class="px-6 py-4 flex items-center gap-2">
              <a [routerLink]="['/cultivos/editar', c.id]"
                 class="p-2 text-[#206223] hover:bg-green-50 rounded-lg transition-all">
                <span class="material-symbols-outlined text-lg">edit</span>
              </a>
              <button (click)="eliminar(c.id)"
                 class="p-2 text-[#ba1a1a] hover:bg-red-50 rounded-lg transition-all">
                <span class="material-symbols-outlined text-lg">delete</span>
              </button>
            </td>
          </tr>
          <tr *ngIf="cultivos.length === 0">
            <td colspan="7" class="px-6 py-16 text-center text-stone-400">
              <span class="material-symbols-outlined text-4xl block mb-2">grass</span>
              No hay cultivos registrados.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
