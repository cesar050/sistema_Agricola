<div class="p-8">
  <div class="flex justify-between items-end mb-8">
    <div>
      <h2 style="font-family:'Manrope',sans-serif" class="text-4xl font-extrabold text-[#1a1c1a]">Sensores</h2>
      <p class="text-[#40493d] mt-1">Dispositivos de monitoreo por cultivo.</p>
    </div>
    <a routerLink="/sensores/nuevo"
       class="bg-[#206223] text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:opacity-90 transition-all text-sm">
      <span class="material-symbols-outlined">add</span> Nuevo Sensor
    </a>
  </div>

  <div *ngIf="mensaje" class="mb-6 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-xl text-sm font-medium">
    {{ mensaje }}
  </div>

  <div *ngIf="loading" class="text-center py-20 text-stone-400">
    <span class="material-symbols-outlined text-5xl">sensors</span>
    <p class="mt-2">Cargando sensores...</p>
  </div>

  <div *ngIf="!loading">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let s of sensores"
           class="bg-white rounded-xl border border-[#e2e3df] p-6 hover:shadow-md transition-all flex flex-col gap-4">
        <div class="flex justify-between items-start">
          <div class="w-12 h-12 bg-[#f4f4f0] rounded-full flex items-center justify-center text-[#206223]">
            <span class="material-symbols-outlined">{{ iconoSensor(s.tipo_sensor) }}</span>
          </div>
          <span class="text-xs font-bold px-2 py-1 bg-green-100 text-green-800 rounded-full uppercase">Activo</span>
        </div>
        <div>
          <h5 style="font-family:'Manrope',sans-serif" class="text-lg font-bold text-[#1a1c1a] capitalize">
            {{ s.tipo_sensor }}
          </h5>
          <p class="text-sm text-[#40493d] mt-1 flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">location_on</span>
            {{ s.ubicacion || 'Sin ubicación' }}
          </p>
          <p class="text-xs text-stone-400 mt-1 flex items-center gap-1">
            <span class="material-symbols-outlined text-xs">grass</span>
            {{ s.cultivo_nombre }}
          </p>
        </div>
        <div class="flex items-center gap-2 pt-2 border-t border-[#f4f4f0]">
          <a routerLink="/sensores/nuevo"
             class="flex-1 py-2 text-[#206223] font-bold text-sm bg-[#f4f4f0] rounded-lg hover:bg-green-50 transition-all text-center">
            Editar
          </a>
          <button (click)="eliminar(s.id)"
                  class="p-2 text-[#ba1a1a] hover:bg-red-50 rounded-lg transition-all">
            <span class="material-symbols-outlined">delete</span>
          </button>
        </div>
      </div>
    </div>

    <div *ngIf="sensores.length === 0" class="text-center py-20 text-stone-400">
      <span class="material-symbols-outlined text-5xl block mb-2">sensors</span>
      No hay sensores registrados.
    </div>
  </div>
</div>
