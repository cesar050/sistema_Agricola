<div class="p-8 max-w-2xl">
    <div class="mb-8">
      <a routerLink="/lecturas" class="text-[#206223] text-sm font-medium flex items-center gap-1 mb-4 hover:underline">
        <span class="material-symbols-outlined text-base">arrow_back</span> Volver
      </a>
      <h2 style="font-family:'Manrope',sans-serif" class="text-4xl font-extrabold text-[#1a1c1a]">Nueva Lectura</h2>
    </div>
  
    <div *ngIf="error" class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">{{ error }}</div>
  
    <div class="bg-white rounded-xl border border-[#e2e3df] p-8">
      <form (ngSubmit)="guardar()" #f="ngForm" class="space-y-6">
        <div>
          <label class="block text-xs font-bold text-[#40493d] uppercase tracking-wider mb-2">Sensor</label>
          <select [(ngModel)]="lectura.sensor_id" name="sensor_id" required
                  class="w-full border border-[#bfcaba] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#206223] transition-all bg-white">
            <option value="0">Seleccione un sensor</option>
            <option *ngFor="let s of sensores" [value]="s.id">
              {{ s.tipo_sensor }} — {{ s.ubicacion || 'Sin ubicación' }} ({{ s.cultivo_nombre }})
            </option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-[#40493d] uppercase tracking-wider mb-2">Valor Registrado</label>
          <input [(ngModel)]="lectura.valor" name="valor" type="number" step="0.01" required
                 class="w-full border border-[#bfcaba] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#206223] transition-all"
                 placeholder="0.00"/>
        </div>
        <div>
          <label class="block text-xs font-bold text-[#40493d] uppercase tracking-wider mb-3">Estado de Alerta</label>
          <div class="flex gap-4">
            <label *ngFor="let op of [{v:'normal',c:'green'},{v:'alerta',c:'yellow'},{v:'crítico',c:'red'}]"
                   class="flex items-center gap-2 cursor-pointer px-4 py-2 rounded-xl border-2 transition-all"
                   [ngClass]="lectura.estado_alerta === op.v ? 'border-[#206223] bg-green-50' : 'border-[#e2e3df]'">
              <input type="radio" [(ngModel)]="lectura.estado_alerta" [value]="op.v" name="estado_alerta" class="sr-only"/>
              <span class="w-2 h-2 rounded-full"
                    [ngClass]="{'bg-green-500': op.v==='normal','bg-yellow-500': op.v==='alerta','bg-red-500': op.v==='crítico'}"></span>
              <span class="text-sm font-semibold capitalize">{{ op.v }}</span>
            </label>
          </div>
        </div>
        <div class="flex justify-end gap-4 pt-4">
          <a routerLink="/lecturas" class="px-6 py-3 text-stone-500 font-semibold hover:bg-stone-50 rounded-xl transition-all text-sm">Cancelar</a>
          <button type="submit" [disabled]="loading || f.invalid"
                  class="bg-[#206223] text-white px-8 py-3 rounded-xl font-bold hover:opacity-90 transition-all disabled:opacity-50 text-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-base">save</span>
            {{ loading ? 'Guardando...' : 'Guardar Lectura' }}
          </button>
        </div>
      </form>
    </div>
  </div>
